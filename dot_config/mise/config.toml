# Claude Code is managed by mise (backend aqua:anthropics/claude-code), updated via
# `mise up claude`. Disable the built-in self-updater: otherwise it recreates the
# native copy in ~/.local/share/claude, resurrecting a duplicate next to the mise one.
[env]
DISABLE_AUTOUPDATER = "1"

[settings]
# `pipx:` backend installs PyPI CLIs through uv (not standalone pipx) — single Python engine.
pipx.uvx = true
# Enable mise hooks (enter/leave/cd). Lets a project's mise.toml self-activate its git
# hooks via `[hooks] enter = "git config core.hooksPath .githooks"` — no manual `git config`
# on every new machine. Machine-level default, so repos carry only [hooks], not this flag.
experimental = true
# `sweb` is my own published CLI — exclude it from the minimum_release_age supply-chain
# delay so my freshly-tagged releases install immediately. The delay stays on for every
# other (third-party) tool.
minimum_release_age_excludes = ["github:sanchpet/sweb"]

[tools]
bitwarden = "latest"
chezmoi = "latest"
uv = "latest"
claude = "latest"     # CLI; update via `mise up claude` (self-update off in [env])
gh = "latest"
glab = "latest"
kubectl = "latest"
node = "latest"
kubectx = "latest"
starship = "latest"  # zsh prompt — initialized in dot_zshrc.tmpl
zoxide = "latest"    # smarter cd — initialized in dot_zshrc.tmpl
python = "latest"
helm = "latest"
terragrunt = "latest"
yq = "latest"
awscli = { version = "latest", symlink_bins = "true" }
fzf = "latest"
ripgrep = "latest"
bat = "latest"
eza = "latest"
delta = "latest"
dust = "latest"
duf = "latest"
"aqua:Byron/dua-cli" = "latest" # dua — interactive disk explorer (aqua, not cargo → no rust)
go = "latest"
fd = "latest"
typst = "latest"
terraform = "latest"
vault = "latest"
cfssl = "latest"
flux2 = "latest"
"pipx:ansible-core" = "latest" # engine + CLIs via uv (bundle `ansible` needs --include-deps/pipx)
yamllint = "latest"            # pipx backend → uv tool install
"pipx:ansible-lint" = "latest" # not in mise registry — backend stated explicitly
hyperfine = "latest"
opencode = "latest"
aqua = "latest"
# claudeline — Claude Code statusline. aqua backend: checksum-verified, per-version installs
# (vs the github backend's best-effort asset guess). Switched once the aqua-registry entry
# landed (aquaproj/aqua-registry#55083). Fallback if aqua ever lags: "github:lexfrei/claudeline".
"aqua:lexfrei/claudeline" = "latest"
crane = "latest"
regctl = "latest"
oras = "latest"
"github:sanchpet/sweb" = "latest" # my SpaceWeb hosting CLI (excluded from minimum_release_age above)

# Yandex Cloud CLI — not in the mise registry (closed source, no GitHub Releases),
# so the http backend: version pin + sha256 = reproducibility and supply-chain.
# To update: bump version + url + checksum (sha256 of the new binary), then commit.
# Latest version: curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/release/stable
[tools."http:yc"]
version = "1.12.0"

[tools."http:yc".platforms.macos-arm64]
url = "https://storage.yandexcloud.net/yandexcloud-yc/release/1.12.0/darwin/arm64/yc"
checksum = "sha256:d06587aeb98ee204f20cf98e36d64e29d5b55506043732dbb63ad8829f90c5ed"
size = "159982402"
