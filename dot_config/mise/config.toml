[tools]
bitwarden = "latest"
chezmoi = "latest"
uv = "latest"
claude = "latest"
gh = "latest"
glab = "latest"
kubectl = "latest"
node = "latest"
kubectx = "latest"
starship = "latest"  # zsh prompt — initialized in dot_zshrc.tmpl
zoxide = "latest"    # smarter cd — initialized in dot_zshrc.tmpl
python = "latest"
helm = "latest"
terragrunt = "latest"
yq = "latest"
awscli = { version = "latest", symlink_bins = "true" }
fzf = "latest"
ripgrep = "latest"
bat = "latest"
eza = "latest"
delta = "latest"
dust = "latest"
duf = "latest"
rust = "latest"
"cargo:broot" = "latest"
fd = "latest"

# Yandex Cloud CLI — not in the mise registry (closed source, no GitHub Releases),
# so the http backend: version pin + sha256 = reproducibility and supply-chain.
# To update: bump version + url + checksum (sha256 of the new binary), then commit.
# Latest version: curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/release/stable
[tools."http:yc"]
version = "1.12.0"

[tools."http:yc".platforms.macos-arm64]
url = "https://storage.yandexcloud.net/yandexcloud-yc/release/1.12.0/darwin/arm64/yc"
checksum = "sha256:d06587aeb98ee204f20cf98e36d64e29d5b55506043732dbb63ad8829f90c5ed"
size = "159982402"
