[tools]
bitwarden = "latest"
chezmoi = "latest"
uv = "latest"
claude = "latest"
gh = "latest"
glab = "latest"
kubectl = "latest"
node = "latest"

# Yandex Cloud CLI — нет в реестре mise (закрытый исходник, без GitHub Releases),
# поэтому http-бэкенд: пиннинг версии + sha256 = воспроизводимость и supply-chain.
# Обновление = бамп version + url + checksum (sha256 нового бинаря), затем commit.
# Версия: curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/release/stable
[tools."http:yc"]
version = "1.12.0"

[tools."http:yc".platforms.macos-arm64]
url = "https://storage.yandexcloud.net/yandexcloud-yc/release/1.12.0/darwin/arm64/yc"
checksum = "sha256:d06587aeb98ee204f20cf98e36d64e29d5b55506043732dbb63ad8829f90c5ed"
size = "159982402"
