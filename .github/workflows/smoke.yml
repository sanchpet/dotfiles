name: smoke

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  bare-machine:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    # chezmoi init дёргает .chezmoi.toml.tmpl → promptStringOnce. В не-TTY (CI)
    # интерактивный промпт падает с "could not open a new TTY", поэтому профиль
    # задаём явно через env (env-override в .chezmoi.toml.tmpl). personal — лёгкий
    # путь: ставит только общие casks, без тяжёлого work-only dotnet-sdk.
    env:
      DOTFILES_PROFILE: personal
    steps:
      - name: Base deps (Linux — на macOS curl/git/zsh уже есть)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y curl git zsh ca-certificates

      - name: Clone + bootstrap (как в README quickstart)
        run: |
          git clone "https://github.com/${{ github.repository }}" "$HOME/dotfiles"
          bash "$HOME/dotfiles/bootstrap.sh"

      - name: Verify (общее — mise / chezmoi / dotfiles / omz)
        shell: bash
        run: |
          export PATH="$HOME/.local/bin:$HOME/.local/share/mise/shims:$PATH"
          echo "mise:    $(mise --version)"
          echo "chezmoi: $(chezmoi --version)"
          test -f "$HOME/.gitconfig"               || { echo "❌ нет ~/.gitconfig"; exit 1; }
          test -f "$HOME/.config/mise/config.toml"  || { echo "❌ нет mise config"; exit 1; }
          test -d "$HOME/.oh-my-zsh"                || { echo "❌ нет Oh My Zsh"; exit 1; }
          git -C "$HOME/.local/share/chezmoi" remote get-url origin | grep -q '^https://' \
            || { echo "❌ origin не HTTPS в CI"; exit 1; }
          echo "✅ core bootstrap OK"

      - name: Verify brew bundle (macOS — casks из Brewfile.tmpl)
        if: runner.os == 'macOS'
        run: |
          export PATH="$HOME/.local/bin:$HOME/.local/share/mise/shims:$PATH"
          # Brewfile теперь шаблон — рендерим тем же профилем, что выбрал bootstrap
          # (в CI env DOTFILES_PROFILE не задан → profile=personal), и проверяем его.
          chezmoi execute-template < "$HOME/dotfiles/Brewfile.tmpl" > /tmp/Brewfile.rendered
          brew bundle check --file=/tmp/Brewfile.rendered \
            || { echo "❌ brew bundle: не все пакеты из Brewfile установлены"; exit 1; }
          echo "✅ brew bundle OK (casks установлены)"

  # Быстрая проверка per-machine логики Brewfile.tmpl — без установки пакетов.
  # Покрывает ветку profile=work (dotnet-sdk), которую bootstrap-job в CI не ставит,
  # чтобы не тянуть тяжёлый cask + sudo. Рендер сравнивается для обоих профилей.
  templates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install chezmoi
        run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin"

      - name: Brewfile.tmpl рендерится корректно для обоих профилей
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          printf '[data]\n  profile = "work"\n'     > /tmp/work.toml
          printf '[data]\n  profile = "personal"\n' > /tmp/personal.toml
          work=$(chezmoi --config /tmp/work.toml execute-template < Brewfile.tmpl)
          personal=$(chezmoi --config /tmp/personal.toml execute-template < Brewfile.tmpl)

          if ! grep -q 'cask "freelens"' <<<"$work"; then
            echo "❌ work: нет общего cask freelens"; exit 1
          fi
          if ! grep -q 'cask "dotnet-sdk"' <<<"$work"; then
            echo "❌ work: нет work-only cask dotnet-sdk"; exit 1
          fi
          if grep -q 'cask "dotnet-sdk"' <<<"$personal"; then
            echo "❌ personal: dotnet-sdk просочился в personal-профиль"; exit 1
          fi
          echo "✅ Brewfile.tmpl: work=freelens+dotnet-sdk, personal=freelens"

      - name: dot_gitconfig.tmpl — правильная identity по профилю
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          printf '[data]\n  profile = "work"\n'     > /tmp/work.toml
          printf '[data]\n  profile = "personal"\n' > /tmp/personal.toml
          gwork=$(chezmoi --config /tmp/work.toml execute-template < dot_gitconfig.tmpl)
          gpers=$(chezmoi --config /tmp/personal.toml execute-template < dot_gitconfig.tmpl)

          if ! grep -q 'email = petrov_ad@magnit.ru' <<<"$gwork"; then
            echo "❌ work: нет рабочей почты"; exit 1
          fi
          if ! grep -q 'email = petrov@sanch.pet' <<<"$gpers"; then
            echo "❌ personal: нет личной почты"; exit 1
          fi
          if grep -q 'magnit.ru' <<<"$gpers"; then
            echo "❌ personal: рабочая почта просочилась в personal-профиль"; exit 1
          fi
          echo "✅ dot_gitconfig.tmpl: work=magnit, personal=sanch.pet"
