name: smoke

on:
  # Docs (*.md, LICENSE) don't affect the setup process, so skip the smoke run for
  # doc-only changes. A commit touching both docs and real files still runs (paths-ignore
  # skips only when every changed file matches). workflow_dispatch is the manual escape.
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - LICENSE
  pull_request:
    paths-ignore:
      - '**.md'
      - LICENSE
  workflow_dispatch:

jobs:
  # The repo is macOS-only by nature (Brewfile = Homebrew casks, installed only on
  # macOS). Linux is not tested: it is not among the target machines.
  bare-machine:
    runs-on: macos-latest
    # chezmoi init triggers .chezmoi.toml.tmpl → promptStringOnce. In a non-TTY (CI)
    # the interactive prompt fails with "could not open a new TTY", so the profile is
    # set explicitly via env (env-override in .chezmoi.toml.tmpl). personal is the light
    # path: it installs only the shared casks, without the heavy work-only dotnet-sdk.
    env:
      DOTFILES_PROFILE: personal
      # mise resolves tool versions via the GitHub API; unauthenticated CI hits the
      # 60 req/hour rate limit (403 → "No versions found"). The auto-provided token
      # raises it to 5000/hour. mise reads GITHUB_TOKEN.
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Clone + bootstrap (as in the README quickstart)
        run: |
          git clone "https://github.com/${{ github.repository }}" "$HOME/dotfiles"
          bash "$HOME/dotfiles/bootstrap.sh"

      - name: Verify (core — mise / chezmoi / dotfiles / omz)
        shell: bash
        run: |
          export PATH="$HOME/.local/bin:$HOME/.local/share/mise/shims:$PATH"
          echo "mise:    $(mise --version)"
          echo "chezmoi: $(chezmoi --version)"
          test -f "$HOME/.gitconfig"               || { echo "❌ missing ~/.gitconfig"; exit 1; }
          test -f "$HOME/.config/mise/config.toml"  || { echo "❌ missing mise config"; exit 1; }
          test -d "$HOME/.oh-my-zsh"                || { echo "❌ missing Oh My Zsh"; exit 1; }
          # chezmoi's source is the bootstrap clone itself (chezmoi init --source), not a
          # second copy in ~/.local/share/chezmoi. Without a registered SSH key the origin→SSH
          # switch (bootstrap step 8) must not fire, so the clone stays on HTTPS in CI.
          src="$(chezmoi source-path)"
          git -C "$src" remote get-url origin | grep -q '^https://' \
            || { echo "❌ chezmoi source origin is not HTTPS in CI ($src)"; exit 1; }
          echo "✅ core bootstrap OK"

      - name: Verify .zshrc loads (omz + starship + zoxide + mise)
        run: |
          export PATH="$HOME/.local/bin:$HOME/.local/share/mise/shims:$PATH"
          test -f "$HOME/.zshrc" || { echo "❌ missing ~/.zshrc"; exit 1; }
          # A fresh interactive zsh must load without errors and bring up the components.
          # zoxide is configured with `--cmd cd`, so it provides `cd`/`cdi` (no `z`).
          out=$(zsh -i -c 'echo "starship=${STARSHIP_SHELL:-no}"; type cdi >/dev/null 2>&1 && echo "zoxide=yes" || echo "zoxide=no"' 2>&1)
          echo "$out"
          grep -q 'starship=zsh' <<<"$out" || { echo "❌ starship did not activate in .zshrc"; exit 1; }
          grep -q 'zoxide=yes'   <<<"$out" || { echo "❌ zoxide did not activate in .zshrc"; exit 1; }
          echo "✅ .zshrc loads OK (starship + zoxide active)"

      - name: Verify brew bundle (casks from Brewfile.tmpl)
        run: |
          export PATH="$HOME/.local/bin:$HOME/.local/share/mise/shims:$PATH"
          # Brewfile is a template; render it with the same profile bootstrap chose
          # (env DOTFILES_PROFILE=personal on the job) and check it.
          chezmoi execute-template < "$HOME/dotfiles/Brewfile.tmpl" > /tmp/Brewfile.rendered
          brew bundle check --file=/tmp/Brewfile.rendered \
            || { echo "❌ brew bundle: not all packages from the Brewfile are installed"; exit 1; }
          echo "✅ brew bundle OK (casks installed)"

  # Quick check of the per-machine template logic — without installing packages.
  # Covers the profile=work branch (dotnet-sdk) that the bootstrap job does not install,
  # to avoid pulling the heavy cask + sudo. Rendering is compared for both profiles.
  # Pure template rendering is OS-independent → ubuntu runner (faster/cheaper than macOS);
  # this is NOT a Linux-support check.
  templates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install chezmoi
        run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin"

      - name: Brewfile.tmpl renders correctly for both profiles
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          printf '[data]\n  profile = "work"\n'     > /tmp/work.toml
          printf '[data]\n  profile = "personal"\n' > /tmp/personal.toml
          work=$(chezmoi --config /tmp/work.toml execute-template < Brewfile.tmpl)
          personal=$(chezmoi --config /tmp/personal.toml execute-template < Brewfile.tmpl)

          if ! grep -q 'cask "freelens"' <<<"$work"; then
            echo "❌ work: missing shared cask freelens"; exit 1
          fi
          if ! grep -q 'cask "dotnet-sdk"' <<<"$work"; then
            echo "❌ work: missing work-only cask dotnet-sdk"; exit 1
          fi
          if grep -q 'cask "dotnet-sdk"' <<<"$personal"; then
            echo "❌ personal: dotnet-sdk leaked into the personal profile"; exit 1
          fi
          echo "✅ Brewfile.tmpl: work=freelens+dotnet-sdk, personal=freelens"

      - name: git identity — personal default, work scoped to ~/IWE/magnit
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          # Identity is directory-based, not profile-based: dot_gitconfig.tmpl always
          # renders the personal identity + an includeIf delegating work repos to
          # work.inc. The signing block is gated on the SSH key, which the runner does
          # not have, so it is correctly absent from the rendered output here.
          g=$(chezmoi execute-template < dot_gitconfig.tmpl)

          if ! grep -q 'email = petrov@sanch.pet' <<<"$g"; then
            echo "❌ gitconfig: missing personal email in the base config"; exit 1
          fi
          if grep -q 'magnit.ru' <<<"$g"; then
            echo "❌ gitconfig: work email must never appear in the base config"; exit 1
          fi
          if ! grep -q 'gitdir:~/IWE/magnit/' <<<"$g"; then
            echo "❌ gitconfig: missing work includeIf for ~/IWE/magnit/"; exit 1
          fi
          if ! grep -q 'email = petrov_ad@magnit.ru' dot_config/git/work.inc; then
            echo "❌ work.inc: missing work email"; exit 1
          fi
          if ! grep -q 'gpgsign = false' dot_config/git/work.inc; then
            echo "❌ work.inc: signing must be disabled for work repos"; exit 1
          fi
          echo "✅ git identity: base=sanch.pet + includeIf, work.inc=magnit (signing off)"
