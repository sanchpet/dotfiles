# Project-local tooling for developing the dotfiles repo.
# NOT deployed to $HOME (see .chezmoiignore). The user's global tools live in
# dot_config/mise/config.toml (→ ~/.config/mise/config.toml).
[tools]
pre-commit = { version = "4.6.0", postinstall = "mise exec -- pre-commit install --install-hooks || true" }
