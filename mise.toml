# Project-local тулинг для разработки dotfiles-репо.
# НЕ деплоится в $HOME (см. .chezmoiignore). Глобальные инструменты пользователя —
# в dot_config/mise/config.toml (→ ~/.config/mise/config.toml).
[tools]
pre-commit = { version = "4.6.0", postinstall = "mise exec -- pre-commit install --install-hooks || true" }
